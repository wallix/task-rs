# The project's own Taskfile, run with the tool it builds. Authored in the
# native Jinja dialect (see `task --migrate`).
version: '3'
templater: jinja

tasks:
  default:
    cmds:
      - task: lint
      - task: test

  build:
    desc: Build the task binary (debug)
    cmds:
      - cargo build -p task

  run:
    desc: Run task from source
    cmds:
      - cargo run -q -p task -- {{ CLI_ARGS }}

  install:
    desc: Install the task binary
    aliases: [i]
    cmds:
      - cargo install --path crates/task

  test:
    desc: Run the test suite
    aliases: [t]
    cmds:
      - cargo test --workspace

  lint:
    desc: Run clippy on all targets
    aliases: [l]
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    desc: Format all sources
    aliases: [f, format]
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Check that all sources are formatted
    cmds:
      - cargo fmt --all -- --check

  release:build:
    desc: Build the static-musl release binary (dist/task) via build.sh
    cmds:
      - ./build.sh {{ CLI_ARGS }}

  release:
    desc: Cut a release — `task release -- <MAJOR.MINOR.PATCH>` (add the CHANGELOG entry first)
    summary: |
      Sets the version across the workspace, checks the CHANGELOG has a matching
      `## v<version>` section, then commits, tags v<version>, and pushes. The
      Release GitHub workflow builds and publishes the per-platform artifacts.
    prompt: Cut and push release v{{ CLI_ARGS }}?
    cmds:
      - ./release.sh {{ CLI_ARGS }}

  clean:
    desc: Clean build artifacts
    aliases: [clear]
    cmds:
      - cargo clean
      - rm -rf dist/
