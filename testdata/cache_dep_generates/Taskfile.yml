version: '3'

vars:
  CACHE_DIR:
    sh: echo "$CACHE_DIR"

tasks:
  # Wrapper task: uses "from: deps" for both sources and generates.
  wrapper:
    sources:
      - from: deps
    generates:
      - from: deps
    cache:
      url: 'file://{{.CACHE_DIR}}/wrapper-{{.CHECKSUM}}.zip'
    deps:
      - leaf-a
      - leaf-b

  leaf-a:
    sources:
      - input.txt
    generates:
      - output-a.txt
    cmds:
      - cp input.txt output-a.txt

  leaf-b:
    sources:
      - input.txt
    generates:
      - output-b.txt
    cmds:
      - cp input.txt output-b.txt
